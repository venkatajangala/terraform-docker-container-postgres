;; PgBouncer Configuration File for HA PostgreSQL Cluster
;; Connection pooling for Patroni-managed cluster

[databases]
postgres = host=pg-node-1,pg-node-2,pg-node-3 port=5432 dbname=postgres
pgadmin = host=pg-node-1,pg-node-2,pg-node-3 port=5432 dbname=postgres

[pgbouncer]
; Connection pooling settings
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 30

; Automatic pool recovery
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 15

; Connection validation
query_wait_timeout = 120
client_idle_timeout = 900

; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
log_stats = 1
stats_period = 60

; Admin console
admin_users = pgadmin
stats_users = pgadmin

; Network and authentication
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir = /var/run/postgresql
unix_socket_mode = 0777
unix_socket_group = postgres

; Authentication
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
; auth_query disabled - use userlist.txt only

; Protocol settings
server_round_robin = 1

; Maintenance

; Applications metadata
application_name_add_host = 1

; Enable verbose logging
verbose = 1
