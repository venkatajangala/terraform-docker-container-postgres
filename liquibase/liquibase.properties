# ============================================================================
# Liquibase Configuration for PostgreSQL HA Cluster
# ============================================================================

# Database Connection (via PgBouncer session pool for HA-aware routing)
driver: org.postgresql.Driver
url: jdbc:postgresql://pgbouncer-1:6432/postgres_liquibase
username: postgres
password: ${LIQUIBASE_PASSWORD}

# Changelog and Schema
changeLogFile: changelog/db.changelog-master.yml
outputChangeLogTableName: databasechangelog
outputChangeLogLockTableName: databasechangeloglock

# Execution Options
defaultSchemaName: public
liquibaseSchemaName: public
liquibaseCatalogName:

# Logging
logLevel: info

# Behavior
autoUpdate: false
